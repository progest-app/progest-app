name: "Case A — references/.dirmeta.toml relaxes project-default to casing=any"
path: "references/reference_doc.pdf"
dirmeta_layers:
  - base_dir: "references"
    rules_toml: |
      schema_version = 1

      [[rules]]
      id = "project-default"
      kind = "constraint"
      applies_to = "./**"
      mode = "warn"
      casing = "any"
      charset = "utf8"
      override = true
expected:
  violations: []
